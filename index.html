<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Precious Mahj</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f7f7f8;
      }
      body {
        display: grid;
        place-items: center;
      }
      .card {
        width: min(42rem, calc(100% - 2rem));
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(17, 24, 39, 0.08);
        padding: 24px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.25rem;
      }
      p {
        margin: 0 0 16px;
        line-height: 1.5;
      }
      .cta {
        display: inline-block;
        background: #0a58ca;
        color: #ffffff;
        text-decoration: none;
        font-weight: 600;
        border-radius: 8px;
        padding: 10px 14px;
      }
      .cta:hover {
        background: #0849a8;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Precious Mahj</h1>
      <p>
        If the embedded store does not load, your browser or Shopify security policy may block
        framing. Use this direct link instead.
      </p>
      <a
        class="cta"
        href="https://www.preciouslacejewelry.com/collections/precious-mahj"
        target="_blank"
        rel="noopener noreferrer"
      >
        Open Precious Mahj Store
      </a>
    </main>
  </body>
</html>
