<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Precious Mahj</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f7f7f8;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 16px;
        background: #ffffff;
        border-bottom: 1px solid #e5e7eb;
      }
      .title {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
      }
      .open-link {
        color: #0a58ca;
        text-decoration: none;
        font-size: 0.95rem;
      }
      .open-link:hover {
        text-decoration: underline;
      }
      main {
        height: calc(100% - 53px);
      }
      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #ffffff;
      }
      .fallback {
        max-width: 52rem;
        margin: 20px auto;
        padding: 12px 16px;
        border-radius: 8px;
        background: #fff8e1;
        border: 1px solid #f2d38a;
        color: #5c4400;
        font-size: 0.95rem;
      }
      .fallback a {
        color: inherit;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 class="title">Precious Mahj</h1>
      <a
        class="open-link"
        href="https://www.preciouslacejewelry.com/collections/precious-mahj"
        target="_blank"
        rel="noopener noreferrer"
      >
        Open in new tab
      </a>
    </header>

    <div class="fallback">
      If the embedded store does not load, your browser or Shopify security policy may block
      framing. Use
      <a
        href="https://www.preciouslacejewelry.com/collections/precious-mahj"
        target="_blank"
        rel="noopener noreferrer"
      >
        this direct link
      </a>
      instead.
    </div>

    <main>
      <iframe
        src="https://www.preciouslacejewelry.com/collections/precious-mahj"
        title="Precious Mahj Shopify Collection"
        loading="eager"
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </main>
  </body>
</html>
